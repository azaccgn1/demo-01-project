name: Environment variable
on: push
env:
  FIRST_NAME: Vikas
  LAST_NAME: Kumar

jobs:
  environment:
    runs-on: ubuntu-latest
    env:
      ADDRESS: GHAZIABAD
    steps:
      - name: Printing Environment variable
        run: echo "Hello Mr. $FIRST_NAME $LAST_NAME. Are you from $ADDRESS $STATE ? Running on ${{ vars.OS_VERSION }}"
        env:
          STATE: UP
      - name: Runner Varibale
        run: echo "${{ vars.RUNNER }}"
