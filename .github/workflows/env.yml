name: Environment variable
on: push
env:
  FIRST_NAME: Vikas
  LAST_NAME: Kumar

jobs:
  environment:
    runs-on: ubuntu-latest
    env:
      ADDRESS: GHAZIABAD
    steps:
      - name: Printing Environment variable
        run: echo "Hello Mr. $FIRST_NAME $LAST_NAME. Are you from $ADDRESS $STATE ? Running on ${{ vars.OS_VERSION }}"
        env:
          STATE: UP
      - name: Runner Varibale
        run: echo "${{ vars.RUNNER }}"
      - name: Use variables
        run: |
          echo "OS: ${{ runner.os}}"
          echo "Runner details: ${{ runner.name }}"
          echo "repository variable : $REPOSITORY_VAR"
          echo "organization variable : $ORGANIZATION_VAR"
          echo "overridden variable : $OVERRIDE_VAR"
          echo "variable from shell environment : $env_var"
        env:
          REPOSITORY_VAR: ${{ vars.REPOSITORY_VAR }}
          ORGANIZATION_VAR: ${{ vars.ORGANIZATION_VAR }}
          OVERRIDE_VAR: ${{ vars.OVERRIDE_VAR }}
      - name: Using Secrets
        run: echo "DB User:- ${{ secrets.DB_USER }} and DB Password:- ${{ secrets.DB_PASSWORD }}"
