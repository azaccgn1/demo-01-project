name: Environment variable
on: push
env:
  FIRST_NAME: Vikas
  LAST_NAME: Kumar

jobs:
  test:
    runs-on: ubuntu-latest
    environment: testing
    env:
      ADDRESS: GHAZIABAD
    steps:
      - name: Printing Environment variable
        run: echo "Hello Mr. $FIRST_NAME $LAST_NAME. Are you from $ADDRESS $STATE ? Running on ${{ vars.OS_VERSION }}"
        env:
          STATE: UP
      - name: Runner Varibale
        run: echo "${{ vars.RUNNER }}"
      - name: Using Testing environment
        run: echo "DB User:- ${{ env.DB_USERNAME }} and DB Password:- ${{ env.DB_PASSWORD }}"
  build:
    runs-on: ubuntu-latest
    environment: builds
    steps:
      - name: Using Builds Environment
        run: echo "DB User:- ${{ env.DB_USERNAME }} and DB Password:- ${{ env.DB_PASSWORD }}"
