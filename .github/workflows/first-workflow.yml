name: First Test Workflow
on:
  pull_request:
    types:
      - opened
  push:
    branches:
      - main
      - "dev*"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: get Code
        uses: actions/checkout@v6
      - name: Get Node Version
        run: node --version
      - name: Install Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Get Node Version
        run: node --version
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Deploy
        run: echo "Deploying.........."
